name: Build and Deploy to Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 每日北京时间 03:15 刷新并发布统计图。
    - cron: '15 19 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test GitHub stats generator
        run: npm run test:stats

      - name: Generate GitHub stats SVG
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run generate:stats

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
