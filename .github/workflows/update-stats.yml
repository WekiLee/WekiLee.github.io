name: Update GitHub Stats Images

on:
  schedule:
    # 每天北京时间 03:00 执行（UTC 19:00）
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p public/assets/stats

      - name: Fetch GitHub stats SVG (light)
        run: |
          curl -sL "https://github-readme-stats.vercel.app/api?username=WekiLee\
            &show_icons=true\
            &hide_title=true\
            &include_all_commits=true\
            &theme=transparent\
            &hide_border=true\
            &text_color=6e6e73\
            &icon_color=0071e3\
            &ring_color=0071e3" \
            -o public/assets/stats/github-stats-light.svg

      - name: Fetch GitHub stats SVG (dark)
        run: |
          curl -sL "https://github-readme-stats.vercel.app/api?username=WekiLee\
            &show_icons=true\
            &hide_title=true\
            &include_all_commits=true\
            &theme=transparent\
            &hide_border=true\
            &text_color=86868b\
            &icon_color=0071e3\
            &ring_color=0071e3" \
            -o public/assets/stats/github-stats-dark.svg

      - name: Fetch top languages SVG (light)
        run: |
          curl -sL "https://github-readme-stats.vercel.app/api/top-langs/?username=WekiLee\
            &layout=compact\
            &hide_title=true\
            &theme=transparent\
            &hide_border=true\
            &text_color=6e6e73\
            &ring_color=0071e3" \
            -o public/assets/stats/top-langs-light.svg

      - name: Fetch top languages SVG (dark)
        run: |
          curl -sL "https://github-readme-stats.vercel.app/api/top-langs/?username=WekiLee\
            &layout=compact\
            &hide_title=true\
            &theme=transparent\
            &hide_border=true\
            &text_color=86868b\
            &ring_color=0071e3" \
            -o public/assets/stats/top-langs-dark.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/assets/stats/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update GitHub stats images [$(date -u +%Y-%m-%d)]"
            git push
          fi
